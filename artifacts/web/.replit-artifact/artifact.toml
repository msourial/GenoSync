kind = "web"
previewPath = "/"
title = "GenoSync"
version = "1.0.0"
id = "artifacts/genosync"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26258

[services.development]
run = "pnpm --filter @genosync/web run dev"

[services.production]
build = [ "pnpm", "--filter", "@genosync/web", "run", "build" ]
publicDir = "artifacts/genosync/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26258"
BASE_PATH = "/"
